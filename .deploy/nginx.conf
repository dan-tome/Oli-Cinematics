# =============================================================================
# nginx.conf — Production Nginx config for Oli-Cinematics
# Reverse proxy to Next.js on localhost:3000, TLS via Certbot/Let's Encrypt
#
# Replace every occurrence of YOUR_DOMAIN with your actual domain, e.g.:
#   sed -i 's/YOUR_DOMAIN/oli-cinematics.com/g' /etc/nginx/sites-available/oli-cinematics
#
# SSL certificate paths are left as Certbot placeholders; run:
#   sudo certbot --nginx -d YOUR_DOMAIN -d www.YOUR_DOMAIN
# to have Certbot fill them in automatically.
# =============================================================================

# ---------------------------------------------------------------------------
# Proxy cache — stores static Next.js assets on disk for fast re-delivery
# ---------------------------------------------------------------------------
proxy_cache_path /var/cache/nginx/oli-cinematics
                 levels=1:2
                 keys_zone=oli_static_cache:10m
                 max_size=1g
                 inactive=60d
                 use_temp_path=off;

# ---------------------------------------------------------------------------
# HTTP — redirect all traffic to HTTPS
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;

    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Allow Let's Encrypt ACME challenge through before redirect
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — main site
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # -------------------------------------------------------------------------
    # TLS — Certbot will manage these paths after:
    #   sudo certbot --nginx -d YOUR_DOMAIN -d www.YOUR_DOMAIN
    # -------------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # -------------------------------------------------------------------------
    # Global settings
    # -------------------------------------------------------------------------
    client_max_body_size 10M;

    # -------------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/html
        text/css
        text/plain
        text/xml
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # -------------------------------------------------------------------------
    # Security headers
    # -------------------------------------------------------------------------
    add_header X-Content-Type-Options "nosniff"    always;
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # -------------------------------------------------------------------------
    # Static Next.js assets — long-lived cache (1 year)
    # /_next/static/ filenames are content-hashed, so it is safe to cache forever.
    # -------------------------------------------------------------------------
    location /_next/static/ {
        proxy_pass            http://localhost:3000;
        proxy_cache           oli_static_cache;
        proxy_cache_valid     200 365d;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock      on;

        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Cache-Status $upstream_cache_status;

        # Proxy headers (still needed in case Next.js processes the request)
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------------------------
    # Public static files — moderate cache
    # -------------------------------------------------------------------------
    location /public/ {
        proxy_pass  http://localhost:3000;
        add_header  Cache-Control "public, max-age=86400";
    }

    # -------------------------------------------------------------------------
    # All other requests — reverse proxy to Next.js
    # -------------------------------------------------------------------------
    location / {
        proxy_pass             http://localhost:3000;
        proxy_http_version     1.1;

        # WebSocket upgrade support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — generous for slow API/Stripe webhook processing
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Disable buffering for streaming responses (Server-Sent Events, etc.)
        proxy_buffering off;
    }
}
